<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <title>LungCare+ Pacjenci</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f9fafb;
            --bg-sidebar: white;
            --bg-card: white;
            --text-main: #1f2937;
            --text-sec: #4b5563;
            --border: #e5e7eb;
            --hover: #f3f4f6;
            --input-bg: white;
            --header-bg: white;
        }

        body.dark-mode {
            --bg-body: #111827;
            --bg-sidebar: #1f2937;
            --bg-card: #1f2937;
            --text-main: #f3f4f6;
            --text-sec: #9ca3af;
            --border: #374151;
            --hover: #374151;
            --input-bg: #374151;
            --header-bg: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            animation: wejscie 0.4s ease-out;
        }

        @keyframes wejscie {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Sidebar (Bez zmian) */
        .sidebar {
            width: 72px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 100vh;
            transition: width 0.3s ease-in-out;
            z-index: 50;
            overflow: hidden;
            box-shadow: 4px 0 24px rgba(0,0,0,0.02);
        }

            .sidebar:hover {
                width: 220px;
            }

        .sidebar-header {
            height: 68px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .logo-tekst {
            font-size: 24px;
            color: #007AFF;
            font-weight: 800;
            opacity: 0;
            width: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .sidebar:hover .logo-tekst {
            opacity: 1;
            width: auto;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-sec);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

            .toggle-btn:hover {
                color: #2563eb;
            }

        .sidebar-nav {
            flex: 1;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            width: 100%;
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            color: var(--text-sec);
        }

            .nav-item .material-symbols-outlined {
                width: 20px;
                height: 20px;
                font-size: 20px;
                flex-shrink: 0;
                margin-right: 12px;
            }

        .nav-text {
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .sidebar:hover .nav-text {
            opacity: 1;
            transform: translateX(0);
        }

        .nav-item.active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-item:not(.active):hover {
            background-color: var(--hover);
        }

        .sidebar-footer {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding: 12px;
            background-color: var(--bg-sidebar);
        }

        .user-profile-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            overflow: hidden;
        }

        .profile-left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .avatar-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #3b82f6;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        .user-info {
            opacity: 0;
            width: 0;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .sidebar:hover .user-info {
            opacity: 1;
            width: auto;
        }

        .user-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
        }

        .logout-btn {
            opacity: 0;
            width: 0;
            padding: 0;
            border: none;
            background: transparent;
            color: #dc2626;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .logout-btn:hover {
                background-color: #fee2e2;
                color: #b91c1c;
            }

        .sidebar:hover .logout-btn {
            opacity: 1;
            width: 32px;
            height: 32px;
            padding: 6px;
        }

        /* Main */
        .glowny-widok {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-body);
            overflow: hidden;
        }

        /* Zmodyfikowany Header (Zadanie 4) */
        .gorny-pasek {
            height: 68px;
            padding: 0 40px; /* Ujednolicone paddingi */
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: var(--header-bg);
        }

            /* Styl tytułu zgodny z Vademecum */
            .gorny-pasek h1 {
                font-size: 24px;
                font-weight: 600;
                color: var(--text-main);
                margin: 0;
            }

        .header-akcje {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .licznik-badge {
            background-color: #eff6ff;
            color: #2563eb;
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 600;
        }

        body.dark-mode .licznik-badge {
            background-color: #1e3a8a;
            color: #93c5fd;
        }

        .wyszukiwarka-wrapper {
            position: relative;
            width: 280px;
        }

        .ikona-szukaj {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }

        .input-szukaj {
            width: 100%;
            padding: 8px 10px 8px 36px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 13px;
            outline: none;
            font-family: inherit;
            background: var(--input-bg);
            color: var(--text-main);
        }

            .input-szukaj:focus {
                border-color: #2563eb;
                box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
            }

        /* Tabela */
        .kontener-tabeli {
            padding: 24px 40px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .tabela-wrapper {
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: var(--bg-body);
            border-bottom: 1px solid var(--border);
        }

        th {
            padding: 12px 24px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sec);
            text-transform: uppercase;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background-color 0.2s;
            cursor: pointer;
        }

            tbody tr:hover {
                background-color: var(--hover);
            }

        td {
            padding: 16px 24px;
            font-size: 14px;
            color: var(--text-sec);
            vertical-align: middle;
        }

        .wiersz-krytyczny {
            background-color: #fef2f2;
        }

        .wiersz-uwaga {
            background-color: #fff7ed;
        }

        body.dark-mode .wiersz-krytyczny {
            background-color: rgba(127, 29, 29, 0.2);
        }

        body.dark-mode .wiersz-uwaga {
            background-color: rgba(124, 45, 18, 0.2);
        }

        .ikona-alert {
            font-size: 20px;
            margin-right: 8px;
            vertical-align: middle;
        }

        .alert-czerwony {
            color: #ef4444;
        }

        .alert-pomaranczowy {
            color: #f97316;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-stabilny {
            background-color: #dcfce7;
            color: #15803d;
        }

        .status-uwaga {
            background-color: #fff4e5;
            color: #b45309;
        }

        .status-krytyczny {
            background-color: #fee2e2;
            color: #b91c1c;
        }

        body.dark-mode .status-stabilny {
            background-color: #064e3b;
            color: #6ee7b7;
        }

        body.dark-mode .status-uwaga {
            background-color: #451a03;
            color: #fdba74;
        }

        body.dark-mode .status-krytyczny {
            background-color: #450a0a;
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><h1 class="logo-tekst">LungCare+</h1><button class="toggle-btn" title="Zwiń/Rozwiń"><span class="material-symbols-outlined" style="font-size: 28px;">chevron_left</span></button></div>
        <nav class="sidebar-nav">
            <button class="nav-item active"><span class="material-symbols-outlined">grid_view</span> <span class="nav-text">Pacjenci</span></button>
            <button class="nav-item" onclick="window.location.href='vademecum.html'"><span class="material-symbols-outlined">menu_book</span> <span class="nav-text">Vademecum</span></button>
            <button class="nav-item" onclick="window.location.href='dodaj pacjenta.html'"><span class="material-symbols-outlined">person_add</span> <span class="nav-text">Dodaj Pacjenta</span></button>
            <button class="nav-item" onclick="window.location.href='ustawienia.html'"><span class="material-symbols-outlined">settings</span> <span class="nav-text">Ustawienia</span></button>
        </nav>
        <div class="sidebar-footer">
            <div class="user-profile-container">
                <div class="profile-left"><div class="avatar-circle" id="profil-inicjaly">AK</div><div class="user-info"><p class="user-name" id="profil-imie">Anna Kowalska</p></div></div>
                <button onclick="wyloguj()" class="logout-btn" title="Wyloguj się"><span class="material-symbols-outlined" style="font-size: 20px;">logout</span></button>
            </div>
        </div>
    </aside>
    <main class="glowny-widok">
        <header class="gorny-pasek">
            <h1>Pacjenci</h1>
            <div class="header-akcje">
                <span class="licznik-badge" id="licznik-pacjentow">0 pacjentów</span>
                <div class="wyszukiwarka-wrapper">
                    <span class="material-symbols-outlined ikona-szukaj">search</span>
                    <input type="text" id="input-szukaj" class="input-szukaj" placeholder="Szukaj (Nazwisko)..." onkeyup="filtrujPacjentow()">
                </div>
            </div>
        </header>
        <div class="kontener-tabeli">
            <div class="tabela-wrapper">
                <table>
                    <thead><tr><th>Pacjent</th><th>Wiek</th><th>Status</th></tr></thead>
                    <tbody id="tabela-body"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script>
       // ==============================
// 1. KONFIGURACJA SUPABASE
// ==============================

const SUPABASE_URL="https://sdyggtoponysevmtygkj.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkeWdndG9wb255c2V2bXR5Z2tqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzEzNDAsImV4cCI6MjA4OTQ0NzM0MH0.j5r6TJFuXjfySKOUmbbjv1NvrxZQvc0-IThh5SnUJCc";

// Tworzenie klienta Supabase (połączenie z bazą)
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);


// ==============================
// 2. ZMIENNA GLOBALNA
// ==============================

// Tutaj pacjenci z bazy
let pacjenci = [];


// ==============================
// 3. SORTOWANIE PACJENTÓW
// ==============================

// Funkcja ustawia kolejność:
// Krytyczny -> Wymaga uwagi -> Stabilny
function sortujPacjentow(lista) {

    // Wagi określają kolejność sortowania (im mniejsza liczba tym wyżej)
    const wagi = {
        "Krytyczny": 0,
        "Wymaga uwagi": 1,
        "Stabilny": 2
    };

    // Tworzymy nową posortowaną tablicę
    return [...lista].sort((a, b) => {
        const wagaA = wagi[a.status] ?? 99; // jeśli brak statusu → na koniec
        const wagaB = wagi[b.status] ?? 99;

        return wagaA - wagaB;
    });
}


// ==============================
// 4. RENDEROWANIE TABELI
// ==============================

function renderujTabele(dane) {
    const tbody = document.getElementById('tabela-body');
    tbody.innerHTML = '';

    const posortowane = sortujPacjentow(dane);

    if (posortowane.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="3">Brak pacjentów</td>
            </tr>
        `;
        document.getElementById('licznik-pacjentow').innerText = '0 pacjentów';
        return;
    }

    posortowane.forEach(p => {
        let klasaWiersza = '';
        let ikona = '';

        let klasaStatusu = 'status-stabilny';
        if (p.status === 'Wymaga uwagi') klasaStatusu = 'status-uwaga';
        if (p.status === 'Krytyczny') klasaStatusu = 'status-krytyczny';

        tbody.innerHTML += `
            <tr class="${klasaWiersza}" onclick="kliknieciePacjenta(${p.id})">
                <td>
                    <div style="display:flex; align-items:center;">
                        ${ikona}
                        ${p.name}
                    </div>
                </td>
                <td>${p.age} lat</td>
                <td>
                    <span class="status-badge ${klasaStatusu}">${p.status}</span>
                </td>
            </tr>
        `;
    });

    document.getElementById('licznik-pacjentow').innerText = `${posortowane.length} pacjentów`;
}


// ==============================
// 5. FILTROWANIE (WYSZUKIWARKA)
// ==============================

function filtrujPacjentow() {

    // Pobranie tekstu wpisanego w wyszukiwarce
    const fraza = document.getElementById('input-szukaj').value.toLowerCase();

    // Filtrowanie tylko po imieniu i nazwisku
    const przefiltrowani = pacjenci.filter(p =>
        p.name.toLowerCase().includes(fraza)
    );

    // Renderujemy tylko przefiltrowane wyniki
    renderujTabele(przefiltrowani);
}


// ==============================
// 6. POBIERANIE PACJENTÓW Z BAZY
// ==============================

async function pobierzPacjentowZBazy() {
    const { data, error } = await supabaseClient
        .from('patients')
        .select('*')
        .order('id', { ascending: false });

    if (error) {
        console.error('Błąd pobierania pacjentów z bazy:', error);
        alert('Nie udało się pobrać pacjentów z bazy. Sprawdź konsolę.');
        return;
    }

    console.log('Dane z Supabase:', data);

    pacjenci = data.map(p => ({
        id: p.id,
        name: `${p.first_name || ''} ${p.last_name || ''}`.trim(),
        age: p.age ?? '-',
        status: 'Stabilny'
    }));

    renderujTabele(pacjenci);
}


// ==============================
// 7. NAWIGACJA DO SZCZEGÓŁÓW
// ==============================

function kliknieciePacjenta(id) {

    // Przekazujemy ID pacjenta w URL
    window.location.href = `szczegoly pacjenta.html?id=${id}`;
}


// ==============================
// 8. MOTYW (LIGHT/DARK)
// ==============================

function wczytajMotyw() {
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }
}


// ==============================
// 9. PROFIL UŻYTKOWNIKA
// ==============================

function wczytajProfil() {

    // Pobranie danych użytkownika z localStorage
    const uzytkownik = JSON.parse(localStorage.getItem("zalogowanyUzytkownik")) || {
        imie: "Anna Kowalska",
        inicjaly: "AK",
        kolor: "#3b82f6"
    };

    // Ustawienie danych w UI
    document.getElementById("profil-imie").innerText = uzytkownik.imie;
    document.getElementById("profil-inicjaly").innerText = uzytkownik.inicjaly;
    document.getElementById("profil-inicjaly").style.backgroundColor = uzytkownik.kolor;
}


// ==============================
// 10. WYLOGOWANIE
// ==============================

function wyloguj() {

    // Usunięcie danych z localStorage
    localStorage.removeItem("zalogowanyUzytkownik");
    localStorage.removeItem("theme");

    // Przekierowanie na stronę logowania
    window.location.href = "Strona logowania.html";
}


// ==============================
// 11. START STRONY
// ==============================

window.addEventListener('DOMContentLoaded', async () => {

    // Załadowanie motywu i profilu
    wczytajMotyw();
    wczytajProfil();

    // Pobranie pacjentów z bazy
    await pobierzPacjentowZBazy();
});
    </script>
</body>
</html>
